<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOT - Quadro de Saídas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="theme-color" content="#1a365d">
    <!-- Item 15: pastas relativas ao HTML — ver DEPLOY-QUADRO-SAIDAS.md (GitHub Pages / mesmo origin). -->
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2b4c7e;
            --accent: #38bdf8;
            --bg: #0f172a;
            --bg-elevated: rgba(15, 23, 42, 0.92);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #f97373;
            --card-border: rgba(148, 163, 184, 0.35);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px 12px calc(env(safe-area-inset-bottom, 16px) + 12px);
            gap: 12px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(15,23,42,0.9), rgba(17,24,39,0.96));
            border: 1px solid rgba(148,163,184,0.4);
            box-shadow:
                0 18px 45px rgba(15,23,42,0.9),
                0 0 0 1px rgba(15,23,42,0.8);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title span {
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.45);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .sot-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: radial-gradient(circle at top left, #38bdf8 0, #0f172a 38%);
            color: #e5f0ff;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sot-badge i {
            font-size: 13px;
        }

        .header-right {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .google-login-shell {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .google-login-shell #btn-login {
            padding: 6px 10px;
            border: none;
            border-radius: 999px;
            background: #4285f4;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .google-login-shell #btn-sair {
            padding: 5px 9px;
            border: none;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.35);
            color: #e5e7eb;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .google-login-shell #usuario-info {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text);
            white-space: nowrap;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
        }

        .filter-card {
            margin-top: 2px;
            padding: 10px 10px 12px;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(51, 65, 85, 0.9);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-label i {
            color: var(--accent);
        }

        .date-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .date-input-wrapper input[type="date"] {
            width: 100%;
            padding: 10px 34px 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: rgba(15, 23, 42, 0.92);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
        }

        .date-input-wrapper input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .date-input-wrapper i {
            position: absolute;
            right: 10px;
            color: var(--accent);
            pointer-events: none;
        }

        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .counter-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.6);
            font-size: 12px;
            color: var(--text);
            font-weight: 500;
        }

        .counter-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.22);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-container {
            flex: 1;
            padding: 6px 2px 0;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .empty-state i {
            font-size: 30px;
            margin-bottom: 12px;
            color: rgba(148, 163, 184, 0.9);
        }

        .empty-state-line1 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.35;
        }

        .empty-state-line2 {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.45;
            max-width: 320px;
            margin: 0 auto;
        }

        .empty-state.empty-state--accent i {
            color: var(--accent);
        }

        .empty-state.empty-state--warn i {
            color: #fbbf24;
        }

        .empty-state.empty-state--danger i {
            color: var(--danger);
        }

        .card {
            position: relative;
            border-radius: 16px;
            padding: 10px 12px 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--card-border);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        /* Tarja esmaecida "REALIZADA" na transversal */
        .card-realizada::before {
            content: "REALIZADA";
            position: absolute;
            top: 12px;
            right: -55px;
            transform: rotate(35deg);
            padding: 4px 60px;
            background: rgba(56, 189, 248, 0.16);
            border: 1px solid rgba(125, 211, 252, 0.4);
            color: rgba(226, 232, 240, 0.9);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        /* Saída com KM Saída preenchido; some quando KM Chegada e hora Chegada estiverem preenchidos */
        .card-iniciada {
            border: 1px solid rgba(34, 197, 94, 0.7);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.85), 0 0 0 1px rgba(34, 197, 94, 0.2);
        }

        /* Mesma posição e ângulo da tarja REALIZADA (Finalizada) */
        .card-iniciada::after {
            content: "INICIADA";
            position: absolute;
            top: 12px;
            right: -55px;
            transform: rotate(35deg);
            padding: 4px 60px;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.55);
            color: rgba(220, 252, 231, 0.95);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-align: center;
            z-index: 6;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .time-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(15,23,42,0.96);
            border: 1px solid rgba(148, 163, 184, 0.65);
            font-size: 13px;
            font-weight: 600;
        }

        .time-pill i {
            color: var(--accent);
        }

        .tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.11em;
            color: var(--muted);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            min-width: 0;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            max-width: 100%;
            min-width: 0;
            flex: 1 1 auto;
        }

        .chip-viatura {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.7);
        }

        .chip-motorista {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(56, 189, 248, 0.7);
        }

        .chip span.label {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 10px;
        }

        .chip span.value {
            color: var(--text);
            min-width: 0;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            word-break: break-word;
            line-height: 1.25;
        }

        .card-body {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            min-width: 0;
        }

        .row span.label {
            color: rgba(148, 163, 184, 0.9);
            flex-shrink: 0;
        }

        .row span.value {
            color: var(--text);
            font-weight: 500;
            text-align: right;
            min-width: 0;
            max-width: 62%;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            word-break: break-word;
            line-height: 1.3;
        }

        .destino {
            font-size: 13px;
            color: #e5e7eb;
            min-width: 0;
        }

        .destino strong {
            color: #e5e7eb;
        }

        /* Item 8: destino longo não empurra a largura do card */
        .destino .quadro-destino-text {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            overflow: hidden;
            word-break: break-word;
            line-height: 1.35;
        }

        .card-footer {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(148, 163, 184, 0.4);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
        }

        .card-footer-field {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-footer-field label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .card-footer-field span.value {
            color: var(--text);
            font-weight: 500;
            max-width: min(42vw, 160px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Overlay de edição passo a passo (KM Saída, KM Chegada, Chegada) */
        .card-edit-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .card-edit-box {
            background: rgba(15, 23, 42, 1);
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid rgba(148, 163, 184, 0.85);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.95);
            min-width: 220px;
            max-width: 260px;
        }

        .card-edit-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .card-edit-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.8);
            background: rgba(15, 23, 42, 0.96);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .card-edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .card-edit-btn {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .card-edit-btn.cancel {
            background: rgba(148, 163, 184, 0.18);
            color: var(--muted);
        }

        .card-edit-btn.ok {
            background: rgba(56, 189, 248, 0.18);
            color: #e5f0ff;
            border: 1px solid rgba(56, 189, 248, 0.7);
        }

        .card-edit-blocked-msg {
            font-size: 13px;
            line-height: 1.45;
            color: #e5e7eb;
            margin-bottom: 12px;
            text-align: center;
        }

        .card-edit-blocked-msg strong {
            color: #fbbf24;
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .card-edit-blocked-msg .quadro-blocked-hint {
            display: block;
            margin-top: 10px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .footer-info {
            margin-top: 2px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(148, 163, 184, 0.9);
        }

        .loading {
            display: none;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 8px 0 2px;
        }

        .loading span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: var(--accent);
            animation: pulse 1.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(0.7); opacity: 0.4; }
        }

        /**
         * Item 9 (tablet opcional): ecrãs >480px — contentor mais largo centrado;
         * em paisagem, lista de cards em 2 colunas (retrato mantém 1 coluna, foco móvel).
         */
        @media (min-width: 481px) {
            .app {
                max-width: min(900px, calc(100vw - 20px));
                padding-top: 18px;
            }

            .empty-state-line2 {
                max-width: min(520px, 92vw);
            }
        }

        @media (min-width: 481px) and (orientation: landscape) {
            #cardsContainer {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
                align-content: start;
            }

            #cardsContainer > .card {
                margin-bottom: 0;
            }

            .card-footer-field span.value {
                max-width: min(160px, 100%);
            }
        }

        /* Aviso modal: lista só é mostrada após leitura confirmada do Firebase */
        .quadro-firebase-error-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .quadro-firebase-error-modal.is-open {
            display: flex;
        }

        .quadro-firebase-error-modal__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.82);
            backdrop-filter: blur(4px);
        }

        .quadro-firebase-error-modal__box {
            position: relative;
            max-width: 340px;
            width: 100%;
            padding: 20px 18px 16px;
            border-radius: 16px;
            background: linear-gradient(165deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.99));
            border: 1px solid rgba(248, 113, 113, 0.45);
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(15, 23, 42, 0.9);
            text-align: center;
        }

        .quadro-firebase-error-modal__icon {
            font-size: 28px;
            color: #f97373;
            margin-bottom: 10px;
        }

        .quadro-firebase-error-modal__title {
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 700;
            color: #fecaca;
            line-height: 1.35;
        }

        .quadro-firebase-error-modal__text {
            margin: 0 0 18px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--muted);
        }

        .quadro-firebase-error-modal__btn {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(56, 189, 248, 0.2);
            color: #e0f2fe;
            border: 1px solid rgba(56, 189, 248, 0.55);
        }

        .quadro-firebase-error-modal__btn:focus {
            outline: 2px solid rgba(56, 189, 248, 0.8);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-top">
                <div class="title">
                    <i class="fas fa-route"></i>
                    QUADRO DE SAÍDAS
                    <span>MÓVEL</span>
                </div>
                <div class="header-right">
                    <div class="sot-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>SOT</span>
                    </div>
                    <div id="google-login-shell" class="google-login-shell">
                        <button type="button" id="btn-login">Entrar com Google</button>
                        <div id="usuario-info">
                            <strong id="nome-usuario"></strong>
                            <button type="button" id="btn-sair">Sair</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="subtitle">
                <strong>Saídas Administrativas</strong> do dia. Após preencher KM Saída, KM Chegada e Chegada, o registro fica bloqueado aqui — alterações só no sistema SOT completo.
            </div>
            <div class="filter-card">
                <div class="filter-label">
                    <i class="fas fa-calendar-day"></i>
                    <span>Escolha a data para consultar a agenda:</span>
                </div>
                <div class="date-input-wrapper">
                    <input type="date" id="filterDateMobile" inputmode="numeric">
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="counter-row">
                    <div id="counter" class="counter-pill">
                        <span class="counter-dot"></span>
                        <span><span id="counterValue">0</span> saída(s)</span>
                    </div>
                    <span id="dateLabel" class="tag"></span>
                </div>
            </div>
        </header>

        <div class="content">
            <div id="loading" class="loading">
                <span><span class="loading-dot"></span> Carregando saídas...</span>
            </div>
            <div id="listContainer" class="list-container">
                <div id="emptyState" class="empty-state" role="status" aria-live="polite">
                    <i id="emptyStateIcon" class="far fa-calendar-times" aria-hidden="true"></i>
                    <div id="emptyStateLine1" class="empty-state-line1"></div>
                    <div id="emptyStateLine2" class="empty-state-line2"></div>
                </div>
                <div id="cardsContainer"></div>
            </div>
        </div>

        <div id="quadroFirebaseErrorModal" class="quadro-firebase-error-modal" role="alertdialog" aria-modal="true" aria-labelledby="quadroFirebaseErrorTitle" aria-describedby="quadroFirebaseErrorText">
            <div class="quadro-firebase-error-modal__backdrop" aria-hidden="true"></div>
            <div class="quadro-firebase-error-modal__box">
                <div class="quadro-firebase-error-modal__icon" aria-hidden="true"><i class="fas fa-triangle-exclamation"></i></div>
                <h2 id="quadroFirebaseErrorTitle" class="quadro-firebase-error-modal__title">Dados não carregados do Firebase</h2>
                <p id="quadroFirebaseErrorText" class="quadro-firebase-error-modal__text"></p>
                <button type="button" id="quadroFirebaseErrorOk" class="quadro-firebase-error-modal__btn">Entendi</button>
            </div>
        </div>
    </div>

    <!-- Firebase modular (mesma base do SOT5). Paths resolvem com document.baseURI — manter QuadroDeSaidas.html e pasta "Todas as abas/" irmãos no deploy (item 15). -->
    <script>
      window.__sotFirestoreBoot = import(new URL('Todas as abas/firebase-sot-firestore.mjs', document.baseURI).href)
        .then(function (m) { return m.installFirebaseSot(); });
    </script>
    <!-- Item 14: api-service + data-service carregados sob demanda (updateSaidaField fallback) — ver ensureQuadroDataServiceFallbackLoaded -->
    <script type="module" src="Todas%20as%20abas/firebase-auth.js?v=20260319-1"></script>
    <script>
        function formatDateLabel(isoDate) {
            if (!isoDate) return '';
            const [y, m, d] = isoDate.split('-');
            const date = new Date(Number(y), Number(m) - 1, Number(d));
            const formatter = new Intl.DateTimeFormat('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' });

        // Normaliza data para ISO YYYY-MM-DD (compatibilidade com dados antigos)
        function parseDateToISO(value) {
            if (!value) return '';
            const s = String(value).trim();
            if (!s) return '';
            // Já está em ISO
            if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
            // YYYY-MM-DDTHH:mm:ss...
            if (s.includes('T')) return s.split('T')[0];
            // DD/MM/YYYY (ou DD-MM-YYYY)
            const m = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
            if (m) return `${m[3]}-${String(m[2]).padStart(2, '0')}-${String(m[1]).padStart(2, '0')}`;
            // tenta Date()
            const d = new Date(s);
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }
            return '';
        }

        function getDestinoRaw(saida) {

            if (saida.cidade) partes.push(String(saida.cidade).trim());

        // Formata KM no padrão brasileiro, inserindo ponto para milhares (ex.: 1234 -> 1.234)
        function formatKmValue(value) {
            if (value === null || value === undefined) return '';
            // Mantém apenas dígitos
            let digits = String(value).replace(/[^\d]/g, '');
            if (!digits) return '';
            // Remove zeros à esquerda, mas preserva "0" se for tudo zero
            digits = digits.replace(/^0+(\d)/, '$1');
            if (!digits) digits = '0';
            // Agrupar a cada 3 dígitos da direita para a esquerda
            let result = '';
            while (digits.length > 3) {
                const chunk = digits.slice(-3);
                digits = digits.slice(0, -3);
                result = (result ? '.' + result : chunk + result);
            }
            result = digits + (result ? '.' + result : '');
            return result;
        }

                }
                if (n <= 3000) {
                    try {
                        const bytes = quadroUtf8ByteLength(JSON.stringify(allSaidas));
                        return { recordCount: n, jsonUtf8BytesApprox: bytes, jsonMeasureNote: 'exact_json_stringify' };

                }
                const sampleN = Math.min(120, n);
                const sample = allSaidas.slice(0, sampleN);
                try {
                    const sampleBytes = quadroUtf8ByteLength(JSON.stringify(sample));
                    const per = sampleBytes / sampleN;
                    return {
                        recordCount: n,
                        jsonUtf8BytesApprox: Math.round(per * n),
                        jsonMeasureNote: 'estimated_first_' + sampleN + '_rows'

                msg.className = 'card-edit-blocked-msg';
                const strong = document.createElement('strong');
                strong.textContent = 'Atenção';
                msg.appendChild(strong);
                msg.appendChild(document.createElement('br'));
                msg.appendChild(document.createTextNode(QUADRO_MSG_BLOQUEIO));
                const hint = document.createElement('span');
                hint.className = 'quadro-blocked-hint';
                hint.textContent = 'Edite esta saída apenas no sistema SOT (aba Saídas administrativas).';
                msg.appendChild(hint);
                const actions = document.createElement('div');
                actions.className = 'card-edit-actions';
                const btnOk = document.createElement('button');
                btnOk.className = 'card-edit-btn ok';
                btnOk.textContent = 'Entendi';
                btnOk.addEventListener('click', function () {
                    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                });
                actions.appendChild(btnOk);
                box.appendChild(msg);
                box.appendChild(actions);
                overlay.appendChild(box);
                card.appendChild(overlay);
            }

            // Gera id estável (não depende de km/chegada) para permitir edição mesmo quando s.id vier vazio
            function genSaidaIdStable(saida) {
                const data = getSaidaDateISO(saida);
                const hora = String(saida.horaSaida ?? saida.hora ?? saida.saida ?? '').trim();
                const viatura = String(saida.viatura ?? saida.viatura_id ?? '').trim();
                const motorista = String(saida.motorista ?? saida.motorista_id ?? '').trim();
                const destino = String(saida.hospital ?? saida.objetivo ?? saida.destino ?? '').trim();
                const seed = [data, hora, viatura, motorista, destino].join('|');
                const b = btoa(unescape(encodeURIComponent(seed)));
                return 'gen_' + b.slice(0, 28);
            }

            function getSaidaId(saida) {
                const id = saida?.id ?? saida?._id ?? saida?.uuid ?? saida?.key ?? saida?.saidaId ?? saida?.saida_id;
                if (id != null && String(id).trim() !== '') return String(id).trim();
                return genSaidaIdStable(saida || {});
            }

            function matchSaidaByStableKey(listItem, targetSaida) {
                const aData = getSaidaDateISO(listItem);
                const aHora = String(listItem.horaSaida ?? listItem.hora ?? listItem.saida ?? '').trim();
                const aViatura = String(listItem.viatura ?? listItem.viatura_id ?? '').trim();
                const aMotorista = String(listItem.motorista ?? listItem.motorista_id ?? '').trim();
                const aDestino = (String(listItem.hospital ?? listItem.objetivo ?? listItem.destino ?? '').trim() || String(getDestino(listItem)).trim());

                const bData = getSaidaDateISO(targetSaida);
                const bHora = String(targetSaida.horaSaida ?? targetSaida.hora ?? targetSaida.saida ?? '').trim();
                const bViatura = String(targetSaida.viatura ?? targetSaida.viatura_id ?? '').trim();
                const bMotorista = String(targetSaida.motorista ?? targetSaida.motorista_id ?? '').trim();
                const bDestino = (String(targetSaida.hospital ?? targetSaida.objetivo ?? targetSaida.destino ?? '').trim() || String(getDestino(targetSaida)).trim());

                return (
                    aData === bData &&
                    aHora === bHora &&
                    aViatura === bViatura &&
                    aMotorista === bMotorista &&
                    normStr(aDestino) === normStr(bDestino)
                );
            }

            var _quadroSaidasAdmBc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('sot_saidas_administrativas') : null;

            function doPropagateSaidasKmChegadaToPeers() {
                try {
                    if (_quadroSaidasAdmBc) _quadroSaidasAdmBc.postMessage({ type: 'saidas_updated', t: Date.now() });
                } catch (e) {}
                try {
                    window.parent.postMessage({ type: 'refresh_all_data' }, '*');
                } catch (e) {}
                try {
                    window.top.postMessage({ type: 'request_sync', immediate: true }, '*');
                } catch (e) {}
            }

            /**
             * Durante o fluxo KM (3 modais), não disparar BC/postMessage a cada OK — evita recargas/cache a competir com o passo seguinte.
             * Um único flush em endQuadroKmFlow (ou ao cancelar após já ter gravado).
             */
            function propagateSaidasKmChegadaChangeFromQuadro(field) {
                if (field !== 'kmSaida' && field !== 'kmChegada' && field !== 'chegada') return;
                if (quadroKmFlowActive) {
                    quadroKmPropagatePending = true;
                    return;
                }
                doPropagateSaidasKmChegadaToPeers();
            }

            /**
             * Atualiza UMA saída no Firebase (coleção saidasAdministrativas) e no cache local.
             * Não depende de API backend — usa diretamente firebaseSot quando disponível.
             */
            async function updateSaidaField(saidaId, field, value, saidaOriginal) {
                try {
                    if (saidaOriginal && (field === 'kmSaida' || field === 'kmChegada' || field === 'chegada')) {
                        if (isQuadroRegistroBloqueado(saidaOriginal)) {
                            const err = new Error(QUADRO_MSG_BLOQUEIO);
                            err.code = 'QUADRO_BLOQUEADO';
                            throw err;
                        }
                    }
                    // 1) Tentar atualizar diretamente no Firebase via firebaseSot
                    if (window.firebaseSot && typeof window.firebaseSot.get === 'function' && typeof window.firebaseSot.set === 'function') {
                        const atuais = await window.firebaseSot.get('saidasAdministrativas');
                        let listaFb = Array.isArray(atuais) ? atuais : [];

                        const base = saidaOriginal || {};
                        const resolvedId = saidaId || getSaidaId(base);
                        const next = { ...base, [field]: value, id: resolvedId };

                        // Compatibilidade com nomes alternativos (registros antigos)
                        if (field === 'kmSaida') next.km_saida = value;
                        if (field === 'kmChegada') next.km_chegada = value;

                        // Marca realizada também no Firebase
                        next.realizada = computeRealizadaFromSaida(next);

                        if (saidaOriginal && !listaFb.length) {
                            // Se Firestore ainda não tem dados, começar com o que veio do dataService/JSON
                            listaFb = [next];
                        } else {
                            // 1) Atualiza por id (quando disponível)
                            const idxById = resolvedId ? listaFb.findIndex(s => String(s.id || '').trim() === String(resolvedId).trim()) : -1;

                            // 2) Se não achou, tenta por chave estável (para casos onde s.id veio vazio)
                            const idxStable = idxById === -1 && saidaOriginal ? listaFb.findIndex(s => matchSaidaByStableKey(s, saidaOriginal)) : -1;
                            const idx = idxById !== -1 ? idxById : idxStable;

                            if (idx !== -1) {
                                const existingId = listaFb[idx].id;
                                listaFb[idx] = { ...listaFb[idx], ...next, id: existingId || resolvedId };
                            } else if (saidaOriginal) {
                                listaFb.push(next);
                            }
                        }

                        const ok = await window.firebaseSot.set('saidasAdministrativas', listaFb);

                        // Atualizar cache localStorage com a lista vinda do Firebase
                        try {
                            localStorage.setItem('saidasAdministrativas', JSON.stringify(listaFb));
                        } catch (e) { /* cache local é opcional */ }
                        if (ok) {
                            propagateSaidasKmChegadaChangeFromQuadro(field);
                            return;
                        }
                        console.warn('QuadroDeSaidas: firebaseSot.set retornou falso, tentando fallback.', { ok });
                    }

                    // 2) Fallback: data-service (carga lazy — item 14) só aqui
                    await ensureQuadroDataServiceFallbackLoaded();

                    // 2b) Fallback: usar dataService para atualizar a saída, se disponível
                    if (window.dataService) {
                        if (typeof window.dataService.saveSaidaAdministrativa === 'function' && saidaOriginal) {
                            const base = saidaOriginal || {};
                            const resolvedId = saidaId || getSaidaId(base);
                            const updated = { ...base, [field]: value, id: resolvedId };
                            if (field === 'kmSaida') updated.km_saida = value;
                            if (field === 'kmChegada') updated.km_chegada = value;
                            updated.realizada = computeRealizadaFromSaida(updated);
                            await window.dataService.saveSaidaAdministrativa(updated);
                            try {
                                const raw = localStorage.getItem('saidasAdministrativas');
                                const lista = raw ? JSON.parse(raw) : [];
                                if (Array.isArray(lista)) {
                                    const idxLocal = lista.findIndex(s => s.id === updated.id);
                                    if (idxLocal !== -1) {
                                        lista[idxLocal] = updated;
                                        localStorage.setItem('saidasAdministrativas', JSON.stringify(lista));
                                    }
                                }
                            } catch (e) { /* cache local é opcional */ }
                            propagateSaidasKmChegadaChangeFromQuadro(field);
                            return;
                        }

                        if (typeof window.dataService.getSaidasAdministrativas === 'function' &&
                            typeof window.dataService.setSaidasAdministrativas === 'function') {
                            const todas = await window.dataService.getSaidasAdministrativas();
                            if (!Array.isArray(todas)) return;
                            const base = saidaOriginal || {};
                            const resolvedId = saidaId || getSaidaId(base);
                            const idxById = resolvedId ? todas.findIndex(s => String(s.id || '').trim() === String(resolvedId).trim()) : -1;
                            const idxStable = idxById === -1 && saidaOriginal ? todas.findIndex(s => matchSaidaByStableKey(s, saidaOriginal)) : -1;
                            const idx = idxById !== -1 ? idxById : idxStable;
                            if (idx === -1) return;

                            todas[idx][field] = value;
                            if (field === 'kmSaida') todas[idx].km_saida = value;
                            if (field === 'kmChegada') todas[idx].km_chegada = value;

                            // Atualiza flag realizada também
                            const next = { ...todas[idx], id: todas[idx].id || resolvedId };
                            next.realizada = computeRealizadaFromSaida(next);
                            todas[idx].realizada = next.realizada;
                            await window.dataService.setSaidasAdministrativas(todas);
                            try { localStorage.setItem('saidasAdministrativas', JSON.stringify(todas)); } catch (e) {}
                            propagateSaidasKmChegadaChangeFromQuadro(field);
                            return;
                        }
                    }

                    // 3) Último recurso: atualizar apenas localStorage
                    try {
                        const raw = localStorage.getItem('saidasAdministrativas');
                        const lista = raw ? JSON.parse(raw) : [];
                        if (Array.isArray(lista)) {
                            const base = saidaOriginal || {};
                            const resolvedId = saidaId || getSaidaId(base);
                            const next = { ...base, [field]: value, id: resolvedId };
                            if (field === 'kmSaida') next.km_saida = value;
                            if (field === 'kmChegada') next.km_chegada = value;
                            next.realizada = computeRealizadaFromSaida(next);

                            const idxLocalById = resolvedId ? lista.findIndex(s => String(s.id || '').trim() === String(resolvedId).trim()) : -1;
                            const idxLocalStable = idxLocalById === -1 && saidaOriginal ? lista.findIndex(s => matchSaidaByStableKey(s, saidaOriginal)) : -1;
                            const idx = idxLocalById !== -1 ? idxLocalById : idxLocalStable;

                            if (idx !== -1) {
                                lista[idx] = { ...lista[idx], ...next, id: lista[idx].id || resolvedId };
                                localStorage.setItem('saidasAdministrativas', JSON.stringify(lista));
                                propagateSaidasKmChegadaChangeFromQuadro(field);
                            } else if (saidaOriginal) {
                                lista.push(next);
                                localStorage.setItem('saidasAdministrativas', JSON.stringify(lista));
                                propagateSaidasKmChegadaChangeFromQuadro(field);
                            }
                        }
                    } catch (e) { /* se falhar, não temos o que fazer */ }
                } catch (e) {
                    console.error('QuadroDeSaidas: erro ao salvar edição de saída', e);
                    throw e;
                }
            }

            /**
             * Item 4: reconcilia `realizada` com um único get + um único set do mestre (evita N× get/set via updateSaidaField).
             */
            async function reconcileRealizadaBatchAfterLoad(filteredForDay) {
                if (!filteredForDay || !filteredForDay.length) return;
                if (!window.firebaseSot || typeof window.firebaseSot.get !== 'function' || typeof window.firebaseSot.set !== 'function') {
                    return;
                }

                const divergentes = filteredForDay.filter(s => {
                    const computed = computeRealizadaFromSaida(s);
                    const stored = !!s.realizada;
                    return computed !== stored;
                });
                if (!divergentes.length) return;

                let full;
                try {
                    full = await window.firebaseSot.get('saidasAdministrativas');
                } catch (e) {
                    console.warn('QuadroDeSaidas: reconcile realizada — get mestre falhou', e);
                    return;
                }
                if (!Array.isArray(full)) return;

                let changed = false;
                for (const d of divergentes) {
                    const rid = getSaidaId(d);
                    let idx = rid ? full.findIndex(s => String(s.id || '').trim() === String(rid).trim()) : -1;
                    if (idx === -1) {
                        idx = full.findIndex(s => matchSaidaByStableKey(s, d));
                    }
                    if (idx === -1) continue;

                    const computed = computeRealizadaFromSaida(full[idx]);
                    if (!!full[idx].realizada === computed) {
                        d.realizada = computed;
                        continue;
                    }
                    full[idx] = { ...full[idx], realizada: computed };
                    changed = true;
                    d.realizada = computed;
                }

                if (!changed) return;

                try {
                    const ok = await window.firebaseSot.set('saidasAdministrativas', full);
                    if (ok) {
                        try {
                            localStorage.setItem('saidasAdministrativas', JSON.stringify(full));
                        } catch (e) { /* opcional */ }
                    }
                } catch (e) {
                    console.warn('QuadroDeSaidas: reconcile realizada — set mestre falhou', e);
                }
            }

            /** Item 6: contexto da última lista pintada (delegação de dblclick). */
            let quadroLoadContext = { selectedDate: '', loadMode: 'full', allSaidas: [] };
            let quadroSaidasById = new Map();
            let quadroLastListDateKey = null;

            function findQuadroCardById(container, id) {
                if (!container || id == null || id === '') return null;
                const sid = String(id);
                for (let i = 0; i < container.children.length; i++) {
                    if (container.children[i].dataset.id === sid) return container.children[i];
                }
                return null;
            }

            /** Item 8: truncagem CSS + tooltip nativo com texto completo. */
            function quadroSetTruncatable(el, raw) {
                if (!el) return;
                const s = raw == null ? '' : String(raw).trim();
                if (!s) {
                    el.textContent = '—';
                    el.removeAttribute('title');
                    return;
                }
                el.textContent = s;
                el.title = s;
            }

            function quadroSetFooterField(el, val) {
                if (!el) return;
                const s = val == null || val === '' ? '' : String(val).trim();
                el.textContent = s || '—';
                if (s) el.title = s;
                else el.removeAttribute('title');
            }

            function fillQuadroCardFromSaida(card, saida) {
                if (!card || !saida) return;
                card.className = getQuadroCardClassName(saida);
                const timeSpan = card.querySelector('.time-pill span');
                if (timeSpan) {
                    const hs = (getHoraSaida(saida) || '').trim();
                    timeSpan.textContent = hs || '—';
                    if (hs) timeSpan.title = hs;
                    else timeSpan.removeAttribute('title');
                }
                quadroSetTruncatable(card.querySelector('.chip-viatura .value'), saida.viatura);
                quadroSetTruncatable(card.querySelector('.chip-motorista .value'), saida.motorista);
                quadroSetTruncatable(card.querySelector('.quadro-destino-text'), getDestinoRaw(saida));
                const rows = card.querySelectorAll('.card-body .row');
                if (rows[0]) quadroSetTruncatable(rows[0].querySelector('.value'), saida.setor);
                if (rows[1]) quadroSetTruncatable(rows[1].querySelector('.value'), saida.om);
                const footers = card.querySelectorAll('.card-footer-field span.value');
                if (footers[0]) quadroSetFooterField(footers[0], saida.kmSaida || saida.km_saida);
                if (footers[1]) quadroSetFooterField(footers[1], saida.kmChegada || saida.km_chegada);
                if (footers[2]) quadroSetFooterField(footers[2], saida.chegada);
            }

            /** Item 12: sem innerHTML em estrutura de card (dados vêm depois via textContent em fillQuadroCardFromSaida). */
            function buildQuadroCardFromSaida(saida) {
                const card = document.createElement('div');
                card.dataset.id = getSaidaId(saida) || '';

                function el(tag, className) {
                    const n = document.createElement(tag);
                    if (className) n.className = className;
                    return n;
                }

                const header = el('div', 'card-header');
                const timePill = el('div', 'time-pill');
                const clockIcon = document.createElement('i');
                clockIcon.className = 'far fa-clock';
                clockIcon.setAttribute('aria-hidden', 'true');
                timePill.appendChild(clockIcon);
                timePill.appendChild(el('span'));
                header.appendChild(timePill);
                const typeTag = el('span', 'tag');
                typeTag.textContent = 'Saída Administrativa';
                header.appendChild(typeTag);

                const cardTitle = el('div', 'card-title');
                const chipV = el('div', 'chip chip-viatura');
                const labV = el('span', 'label');
                labV.textContent = 'Viatura';
                chipV.appendChild(labV);
                chipV.appendChild(el('span', 'value'));
                const chipM = el('div', 'chip chip-motorista');
                const labM = el('span', 'label');
                labM.textContent = 'Motorista';
                chipM.appendChild(labM);
                chipM.appendChild(el('span', 'value'));
                cardTitle.appendChild(chipV);
                cardTitle.appendChild(chipM);

                const cardBody = el('div', 'card-body');
                const destino = el('div', 'destino');
                const destStrong = document.createElement('strong');
                destStrong.textContent = 'Destino: ';
                destino.appendChild(destStrong);
                const destSpan = el('span', 'quadro-destino-text');
                destino.appendChild(destSpan);
                cardBody.appendChild(destino);

                function makeRow(labelText) {
                    const row = el('div', 'row');
                    const lab = el('span', 'label');
                    lab.textContent = labelText;
                    row.appendChild(lab);
                    row.appendChild(el('span', 'value'));
                    return row;
                }
                cardBody.appendChild(makeRow('Setor'));
                cardBody.appendChild(makeRow('OM'));

                const cardFooter = el('div', 'card-footer');
                function makeFooterField(labelText) {
                    const wrap = el('div', 'card-footer-field');
                    const lab = document.createElement('label');
                    lab.textContent = labelText;
                    wrap.appendChild(lab);
                    wrap.appendChild(el('span', 'value'));
                    return wrap;
                }
                cardFooter.appendChild(makeFooterField('KM Saída'));
                cardFooter.appendChild(makeFooterField('KM Chegada'));
                cardFooter.appendChild(makeFooterField('Chegada'));

                card.appendChild(header);
                card.appendChild(cardTitle);
                card.appendChild(cardBody);
                card.appendChild(cardFooter);

                fillQuadroCardFromSaida(card, saida);
                return card;
            }

            /**
             * Item 6: mesma data + cards existentes → diff/reordena; mudança de data ou lista vazia antes → rebuild completo.
             */
            function applyQuadroCardsDOM(filtered, selectedDate, loadMode, allSaidas, incremental) {
                quadroLoadContext.selectedDate = selectedDate;
                quadroLoadContext.loadMode = loadMode || 'full';
                quadroLoadContext.allSaidas = allSaidas || [];
                quadroSaidasById.clear();
                filtered.forEach(s => {
                    const sid = getSaidaId(s) || '';
                    if (sid) quadroSaidasById.set(sid, s);
                });

                if (!incremental) {
                    cardsContainer.replaceChildren();
                    filtered.forEach(s => cardsContainer.appendChild(buildQuadroCardFromSaida(s)));
                    quadroLastListDateKey = selectedDate;
                    return;
                }

                const idList = filtered.map(s => getSaidaId(s) || '');
                const want = new Set(idList);
                [...cardsContainer.children].forEach(ch => {
                    if (!want.has(ch.dataset.id)) ch.remove();
                });

                for (let i = 0; i < idList.length; i++) {
                    const id = idList[i];
                    const saida = filtered[i];
                    let card = findQuadroCardById(cardsContainer, id);
                    if (!card) {
                        card = buildQuadroCardFromSaida(saida);
                    } else {
                        fillQuadroCardFromSaida(card, saida);
                    }
                    const ref = cardsContainer.children[i];
                    if (card !== ref) {
                        cardsContainer.insertBefore(card, ref);
                    }
                }
                quadroLastListDateKey = selectedDate;
            }

            async function loadSaidasForSelectedDate() {
                const selectedDate = dateInput.value;
                dateLabel.textContent = formatDateLabel(selectedDate);
                hideQuadroEmptyState();
                loading.style.display = 'block';

                try {
                    const result = await getAllSaidas(selectedDate);
                    const allSaidas = result?.saidas || [];
                    const remoteLoaded = !!result?.remoteLoaded;
                    const loadMode = result?.loadMode || 'full';
                    const loadHint = result?.loadHint != null ? result.loadHint : null;
                    const filtered = (allSaidas || []).filter(s => getSaidaDateISO(s) === selectedDate);
                    filtered.sort((a, b) => getHoraSaida(a).localeCompare(getHoraSaida(b)));

                    logQuadroBaselineDiagnostics(allSaidas, filtered, selectedDate, remoteLoaded, loadMode);

                    counterValue.textContent = filtered.length;

                    if (!filtered.length) {
                        cardsContainer.replaceChildren();
                        quadroLastListDateKey = selectedDate;
                        quadroSaidasById.clear();
                        if (remoteLoaded) {
                            closeQuadroFirebaseErrorModalIfOpen();
                            showQuadroEmptyState('no_data');
                        } else {
                            openQuadroFirebaseErrorModal(loadHint, null);
                        }
                        return;
                    }

                    closeQuadroFirebaseErrorModalIfOpen();
                    hideQuadroEmptyState();

                    const useIncremental =
                        quadroLastListDateKey === selectedDate && cardsContainer.children.length > 0;

                    applyQuadroCardsDOM(filtered, selectedDate, loadMode, allSaidas, useIncremental);

                    if (remoteLoaded) {
                        try {
                            await reconcileRealizadaBatchAfterLoad(filtered);
                            filtered.forEach(s => {
                                const c = findQuadroCardById(cardsContainer, getSaidaId(s));
                                if (c) c.className = getQuadroCardClassName(s);
                            });
                        } catch (e) { /* sem bloquear o carregamento */ }
                    }
                } catch (error) {
                    console.error('Erro ao carregar saídas administrativas:', error);
                    cardsContainer.replaceChildren();
                    quadroLastListDateKey = null;
                    quadroSaidasById.clear();
                    counterValue.textContent = '0';
                    openQuadroFirebaseErrorModal('exception', error && error.message ? error.message : String(error));
                } finally {
                    loading.style.display = 'none';
                }
            }

            cardsContainer.addEventListener('dblclick', async function (ev) {
                const card = ev.target.closest('.card');
                if (!card || !cardsContainer.contains(card)) return;
                const sid = card.dataset.id;
                if (!sid) return;
                const saida = quadroSaidasById.get(sid);
                if (!saida) return;
                const selectedDate = dateInput.value;
                let allSaidas = quadroLoadContext.allSaidas || [];

                if (isQuadroRegistroBloqueado(saida)) {
                    showQuadroBloqueadoOverlay(card);
                    return;
                }
                const kmHintList = allSaidas;
                /** Durante estes modais não recarregar a lista nem propagar BC a cada OK (flush no fim). */
                quadroKmFlowActive = true;
                quadroReloadPendingAfterFlow = false;
                quadroKmPropagatePending = false;
                const steps = [
                    { field: 'kmSaida', label: 'KM Saída', type: 'text' },
                    { field: 'kmChegada', label: 'KM Chegada', type: 'text' },
                    { field: 'chegada', label: 'Chegada', type: 'time' }
                ];
                let currentStep = 0;

                const startStep = () => {
                    if (currentStep >= steps.length) return;
                    const step = steps[currentStep];

                    const overlay = document.createElement('div');
                    overlay.className = 'card-edit-overlay';
                    const box = document.createElement('div');
                    box.className = 'card-edit-box';
                    const title = document.createElement('div');
                    title.className = 'card-edit-title';
                    title.textContent = step.label;

                    const input = document.createElement('input');
                    input.className = 'card-edit-input';
                    input.type = step.type === 'time' ? 'time' : 'text';

                    let initialValue = '';
                    if (step.field === 'kmSaida') {
                        initialValue = saida.kmSaida || saida.km_saida || '';
                        if (!initialValue) {
                            const baseHora = getHoraSaida(saida) || '00:00';
                            const prevKm = getPreviousKmChegada(saida.viatura, selectedDate, baseHora, kmHintList);
                            if (prevKm !== null) initialValue = String(prevKm);
                        }
                    } else if (step.field === 'kmChegada') {
                        initialValue = saida.kmChegada || saida.km_chegada || '';
                    } else if (step.field === 'chegada') {
                        if (saida.chegada) {
                            initialValue = saida.chegada;
                        } else {
                            const now = new Date();
                            const hh = String(now.getHours()).padStart(2, '0');
                            const mi = String(now.getMinutes()).padStart(2, '0');
                            initialValue = `${hh}:${mi}`;
                        }
                    }
                    input.value = initialValue;

                    const actions = document.createElement('div');
                    actions.className = 'card-edit-actions';
                    const btnCancel = document.createElement('button');
                    btnCancel.className = 'card-edit-btn cancel';
                    btnCancel.textContent = 'Cancelar';
                    const btnOk = document.createElement('button');
                    btnOk.className = 'card-edit-btn ok';
                    btnOk.textContent = 'OK';
                    actions.appendChild(btnCancel);
                    actions.appendChild(btnOk);

                    box.appendChild(title);
                    box.appendChild(input);
                    box.appendChild(actions);
                    overlay.appendChild(box);
                    card.appendChild(overlay);

                    input.focus();

                    const closeOverlay = () => {
                        card.removeChild(overlay);
                    };

                    btnCancel.addEventListener('click', () => {
                        closeOverlay();
                        endQuadroKmFlow();
                    });

                    btnOk.addEventListener('click', async () => {
                        let val = input.value.trim();
                        if (step.field === 'kmSaida' || step.field === 'kmChegada') {
                            val = formatKmValue(val);
                            input.value = val;
                        }
                        const saidaIdResolved = getSaidaId(saida);
                        const prevField = saida[step.field];
                        const prevKmSaida = saida.km_saida;
                        const prevKmChegada = saida.km_chegada;

                        saida[step.field] = val;
                        if (step.field === 'kmSaida') saida.km_saida = val;
                        if (step.field === 'kmChegada') saida.km_chegada = val;

                        btnOk.disabled = true;
                        btnCancel.disabled = true;
                        const okBtnDefaultLabel = btnOk.textContent;
                        btnOk.replaceChildren();
                        const spinIcon = document.createElement('i');
                        spinIcon.className = 'fas fa-spinner fa-spin';
                        spinIcon.setAttribute('aria-hidden', 'true');
                        btnOk.appendChild(spinIcon);
                        btnOk.appendChild(document.createTextNode(' Enviando...'));

                        try {
                            await updateSaidaField(saidaIdResolved, step.field, val, saida);

                            const footerFields = card.querySelectorAll('.card-footer-field span.value');
                            if (footerFields[currentStep]) {
                                quadroSetFooterField(footerFields[currentStep], val);
                            }

                            card.className = getQuadroCardClassName(saida);

                            closeOverlay();
                            currentStep += 1;
                            if (currentStep >= steps.length) {
                                endQuadroKmFlow();
                            } else {
                                requestAnimationFrame(function () { startStep(); });
                            }
                        } catch (e) {
                            console.error('QuadroDeSaidas: falha ao atualizar campo', step.field, e);
                            saida[step.field] = prevField;
                            if (step.field === 'kmSaida') saida.km_saida = prevKmSaida;
                            if (step.field === 'kmChegada') saida.km_chegada = prevKmChegada;
                            endQuadroKmFlow();
                            btnOk.disabled = false;
                            btnCancel.disabled = false;
                            btnOk.replaceChildren();
                            btnOk.textContent = okBtnDefaultLabel;
                        }
                    });
                };

                startStep();
            });

            dateInput.addEventListener('change', loadSaidasForSelectedDate);

            // Item 10 — contrato completo: CONTRATO-QUADRO-SAIDAS-SYNC.md
            // Leitura do Quadro: sempre lista mestre Firestore `saidasAdministrativas` (getAllSaidas).
            // Recarrega quando Saídas administrativas (SOT) ou outra aba alterar dados:
            // — postMessage refresh_all_data (iframe / mesma janela com pai)
            // — evento storage (outra aba no mesmo site, após localStorage; a aba que grava não recebe)
            // — BroadcastChannel sot_saidas_administrativas (qualquer contexto mesmo origin)
            let reloadInFlight = false;
            let reloadQueued = false;
            let reloadQuadroDebounceTimer = null;

            function scheduleReloadQuadroFromExternal() {
                if (quadroKmFlowActive) {
                    quadroReloadPendingAfterFlow = true;
                    return;
                }
                try { clearTimeout(reloadQuadroDebounceTimer); } catch (e) {}
                reloadQuadroDebounceTimer = setTimeout(function () {
                    reloadQuadroDebounceTimer = null;
                    if (reloadInFlight) {
                        reloadQueued = true;
                        return;
                    }
                    reloadInFlight = true;
                    // Outra aba (SOT) gravou no Firestore; este contexto ainda pode ter cache de 60s.
                    try {
                        if (window.firebaseSot && typeof window.firebaseSot.invalidateQuadroSaidasCaches === 'function') {
                            window.firebaseSot.invalidateQuadroSaidasCaches(dateInput && dateInput.value);
                        } else if (window.firebaseSot && typeof window.firebaseSot.invalidateCache === 'function') {
                            window.firebaseSot.invalidateCache('saidasAdministrativas');
                        }
                    } catch (e) {}
                    loadSaidasForSelectedDate()
                        .catch(function () {})
                        .finally(function () {
                            reloadInFlight = false;
                            if (reloadQueued) {
                                reloadQueued = false;
                                scheduleReloadQuadroFromExternal();
                            }
                        });
                }, 0);
            }

            function endQuadroKmFlow() {
                quadroKmFlowActive = false;
                if (quadroKmPropagatePending) {
                    quadroKmPropagatePending = false;
                    doPropagateSaidasKmChegadaToPeers();
                }
                if (quadroReloadPendingAfterFlow) {
                    quadroReloadPendingAfterFlow = false;
                    scheduleReloadQuadroFromExternal();
                }
            }

            window.addEventListener('storage', function (e) {
                try {
                    if (e.key === 'saidasAdministrativas') scheduleReloadQuadroFromExternal();
                } catch (err) {}
            });

            if (typeof BroadcastChannel !== 'undefined') {
                try {
                    var sotSaidasBc = new BroadcastChannel('sot_saidas_administrativas');
                    sotSaidasBc.onmessage = function () { scheduleReloadQuadroFromExternal(); };
                } catch (err) {}
            }

            window.addEventListener('message', function (event) {
                try {
                    const type = event && event.data && event.data.type;
                    if (type === 'refresh_all_data') scheduleReloadQuadroFromExternal();
                } catch (e) {}
            });

            window.addEventListener('online', function () {
                try {
                    scheduleReloadQuadroFromExternal();
                } catch (e) {}
            });

            window.addEventListener('sot-connection-mode-changed', function (ev) {
                try {
                    var d = ev && ev.detail;
                    if (d && d.offline === false) scheduleReloadQuadroFromExternal();
                } catch (e2) {}
            });

            // Em mobile, o estado de auth pode ficar pronto depois do primeiro load.
            // Quando detectar transição para logado, força reload sem cache.
            setInterval(function () {
                const nowSignedIn = isGoogleSignedInNow();
                if (!lastKnownGoogleSignedIn && nowSignedIn) {
                    try {
                        if (window.firebaseSot && typeof window.firebaseSot.invalidateQuadroSaidasCaches === 'function') {
                            window.firebaseSot.invalidateQuadroSaidasCaches(dateInput && dateInput.value);
                        } else if (window.firebaseSot && typeof window.firebaseSot.invalidateCache === 'function') {
                            window.firebaseSot.invalidateCache('saidasAdministrativas');
                        }
                    } catch (e) {}
                    scheduleReloadQuadroFromExternal();
                }
                lastKnownGoogleSignedIn = nowSignedIn;
            }, 2000);

            await waitForGoogleSignedInFlag(12000);
            await loadSaidasForSelectedDate();
        });
    </script>
</body>
